<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index</title>
    <style>
        
        div{
            margin-top: 40px;
            margin-left: 40px;
            display: inline-block;
            width: 100px;
            height: 100px;
            border: 2px solid;
            position: absolute;
            
        }
        .box1{
            left: 60px;
        }
        .box2{
            left: 110px;
        }
        .box3{
            left: 160px;
        }
    </style>
</head>
<body>
    <div class="box" style="background-color: red; z-index: 4;"></div>
    <div class="box1" style="background-color: purple; z-index: 3;"></div>
    <div class="box2" style="background-color: yellow; z-index: 2;"></div>
    <div class="box3" style="background-color: green; z-index: 1;"></div>
</body>
</html>
